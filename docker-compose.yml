version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vwings_counsellor_frontend
    ports:
      - "8009:8009"
    restart: unless-stopped
    networks:
      - vwings_app_net

networks:
  vwings_app_net:
    driver: bridge
